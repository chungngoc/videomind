name : CI/CD

# Triggers
on:
    push:
        branches: ["*"]
        paths:
          - "app/**"
          - "tests/**"
          - "gradio_demo/**"
          - "mlops/**"
          - "requirements.txt"
          - "Dockerfile"
          - "Makefile"
          - ".github/workflows/**"
    pull_request:
        branches: ["main"]

# Jobs   
jobs:
    # Job 1 : Test
    test:
        name: Lint + Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
        
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: "pip"
            
            - name: Install ffmpeg
              run: sudo apt-get update && sudo apt-get install -y ffmpeg

            - name: Install dependencies
              run: make install
            
            - name: Lint
              run: make lint

            - name: Run tests
              run: make test

    # Job 2: Build + Push
    docker:
        name: Build + Push Docker Image
        runs-on: ubuntu-latest
        needs: test
        if : github.event_name == 'push' && github.ref == 'refs/heads/main'

        permissions:
          contents: read
          packages: write

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

          - name: Log in to GHCR
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}
            
          - name: Build and Push
            uses: docker/build-push-action@v5
            with:
              context: .
              push: true
              tags: ghcr.io/${{ github.repository }}:latest
              cache-from: type=gha
              cache-to: type=gha,mode=max
  

